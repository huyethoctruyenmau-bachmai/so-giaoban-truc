<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>App thực hành GitHub Pages + Code.gs</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f6f4;
      color: #1f2933;
    }
    .header {
      background: #005fae;
      color: #fff;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.25;
    }
    .header-subtitle {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 700;
      opacity: .95;
    }
    .wrap {
      width: min(760px, calc(100% - 24px));
      margin: 14px auto;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 16px;
      outline: none;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      background: #0f8a4b;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary { background: #475569; }
    button.danger { background: #dc2626; }
    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    .notice {
      margin-top: 10px;
      min-height: 40px;
      border-radius: 10px;
      padding: 10px;
      background: #f1f5f9;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .task {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
      margin-top: 8px;
    }
    .task.done .task-text {
      text-decoration: line-through;
      color: #64748b;
    }
    .task-text {
      font-weight: 700;
      line-height: 1.35;
    }
    .task-time {
      margin-top: 3px;
      color: #64748b;
      font-size: 13px;
      font-weight: 400;
    }
    .task button {
      width: auto;
      min-height: 36px;
      font-size: 13px;
    }
    @media (max-width: 560px) {
      .actions { grid-template-columns: 1fr; }
      .task { grid-template-columns: 1fr; }
      .task button { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">APP THỰC HÀNH</div>
    <div class="header-subtitle">GitHub Pages frontend + Google Apps Script Code.gs backend</div>
  </header>

  <main class="wrap">
    <section class="card">
      <h1>Sổ việc đơn giản</h1>
      <label for="taskInput">Nhập công việc</label>
      <input id="taskInput" type="text" placeholder="Ví dụ: Kiểm tra danh sách bệnh nhân hôm nay">

      <div class="actions">
        <button id="btnAdd" type="button">Thêm công việc</button>
        <button id="btnReload" class="secondary" type="button">Tải danh sách</button>
        <button id="btnPing" class="secondary" type="button">Test kết nối</button>
      </div>

      <div id="notice" class="notice">Chưa kết nối.</div>
    </section>

    <section class="card">
      <h1>Danh sách công việc</h1>
      <div id="tasks"></div>
    </section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbw8NJmrzv0bdFkHL2CIcC4fSlGVv7O_gLnSknjdxoYCmNg__J_baDJssGjug_N4oAE5Zw/exec';

    const $ = id => document.getElementById(id);

    async function api(action, data = {}) {
      const res = await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify({ action, data })
      });
      const result = await res.json();
      if (!result.ok) throw new Error(result.message || 'Có lỗi xảy ra');
      return result;
    }

    function setBusy(isBusy) {
      $('btnAdd').disabled = isBusy;
      $('btnReload').disabled = isBusy;
      $('btnPing').disabled = isBusy;
    }

    function show(message) {
      $('notice').textContent = message;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function render(tasks) {
      if (!tasks.length) {
        $('tasks').innerHTML = '<div class="notice">Chưa có công việc nào.</div>';
        return;
      }

      $('tasks').innerHTML = tasks.map(t => `
        <div class="task ${t.status === 'Đã xong' ? 'done' : ''}">
          <div>
            <div class="task-text">${escapeHtml(t.text)}</div>
            <div class="task-time">${escapeHtml(t.status)} · ${escapeHtml(t.createdAt)}</div>
          </div>
          <button type="button" onclick="toggleTask('${t.id}')">${t.status === 'Đã xong' ? 'Mở lại' : 'Đã xong'}</button>
          <button type="button" class="danger" onclick="removeTask('${t.id}')">Xóa</button>
        </div>
      `).join('');
    }

    async function ping() {
      setBusy(true);
      try {
        const result = await api('ping');
        show(result.message + '\n' + result.time);
      } catch (err) {
        show('Lỗi kết nối: ' + err.message);
      } finally {
        setBusy(false);
      }
    }

    async function loadTasks() {
      setBusy(true);
      try {
        const result = await api('list');
        render(result.tasks);
        show('Đã tải danh sách.');
      } catch (err) {
        show('Lỗi tải danh sách: ' + err.message);
      } finally {
        setBusy(false);
      }
    }

    async function addTask() {
      const text = $('taskInput').value.trim();
      if (!text) {
        show('Anh chưa nhập nội dung công việc.');
        return;
      }

      setBusy(true);
      try {
        const result = await api('add', { text });
        $('taskInput').value = '';
        render(result.tasks);
        show('Đã thêm công việc.');
      } catch (err) {
        show('Lỗi thêm công việc: ' + err.message);
      } finally {
        setBusy(false);
      }
    }

    async function toggleTask(id) {
      setBusy(true);
      try {
        const result = await api('toggle', { id });
        render(result.tasks);
        show('Đã cập nhật trạng thái.');
      } catch (err) {
        show('Lỗi cập nhật: ' + err.message);
      } finally {
        setBusy(false);
      }
    }

    async function removeTask(id) {
      setBusy(true);
      try {
        const result = await api('remove', { id });
        render(result.tasks);
        show('Đã xóa công việc.');
      } catch (err) {
        show('Lỗi xóa: ' + err.message);
      } finally {
        setBusy(false);
      }
    }

    $('btnPing').addEventListener('click', ping);
    $('btnReload').addEventListener('click', loadTasks);
    $('btnAdd').addEventListener('click', addTask);
    $('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
  </script>
</body>
</html>
